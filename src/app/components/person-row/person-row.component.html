<app-entity-row-layout [height]="height()" [gap]="gap()" [isMenuOpen]="isMenuOpen()">

  @let person = entity();

  <div text>
    @if (person) {
      <p class="title">{{ person.name }}</p>
      @if (display() === 'search') {
        <p class="sub-info">{{ type | humanize }}</p>
      }
    } @else {
      <div class="skeleton-text title"></div>
      @if (display() === 'search') {
        <div class="skeleton-text sub-info"></div>
      }
    }
  </div>

</app-entity-row-layout>
