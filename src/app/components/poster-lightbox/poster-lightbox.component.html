<div class="lightbox-overlay" (click)="close.emit()" @fadeInOutOpacity>
  <div class="content">
    <img 
      (click)="$event.stopPropagation()"
      [src]="posterPath()" 
      [alt]="title()" 
      decoding="sync"
      fetchpriority="high"
      @fadeInOutScale
    />
    <button class="close-btn" (click)="close.emit()">×</button>
    <div class="info">{{ title() }}</div>
  </div>
</div>
