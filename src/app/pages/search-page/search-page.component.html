<app-action-bar [leftButtonType]="'home'"></app-action-bar>

<section class="page-container">
  <h1>Search</h1>

  <div class="search-toggle">
    <button 
      class="search-toggle-button" 
      [class.is-active]="mode() === 'library'"
      (click)="onModeChange('library')"
    >
      Library
    </button>
    <button 
      class="search-toggle-button" 
      [class.is-active]="mode() === 'api'"
      (click)="onModeChange('api')"
    >
      Internet
    </button>
  </div>

  @if (mode(); as mode) {
    <div class="search-box">
      <input 
        #searchInput
        class="input-search"
        type="text"
        [placeholder]="'Search '+(mode === 'library' ? 'in' : 'on')+' the '+(mode === 'library' ? 'library' : 'internet')+'...'"
        [value]="searchQuery()"
        (input)="searchQuery.set($any($event.target).value)"
        (keydown.enter)="searchInput.blur()"
        (keydown.escape)="searchQuery.set(''); searchInput.blur()"
      />
    </div>

    @if (mode === 'library') {
      <app-search-list 
        class="virtual-host virtual-host-list"
        [layoutData]="layoutData()" 
      >
      </app-search-list>
    } @else {
      <app-api-search-list
        class="virtual-host virtual-host-list"
        [layoutData]="apiResults()" 
        (endReached)="onScroll()"
      >
      </app-api-search-list>
    }
  }

</section>
