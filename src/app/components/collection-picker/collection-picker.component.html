<app-generic-picker
  [title]="'Add « ' + media.title + ' » to'"
  [resultCount]="collectionCount()"
  (searchChange)="onSearch($event)"
  (onCancel)="onCancel.emit()"
  (onConfirm)="onConfirm.emit($event)"
  #picker
>
  <app-collections-list 
    class="virtual-host virtual-host-list picker-content"
    [collectionIds]="collectionResults()" 
    (endReached)="onScroll()"
  >
    <ng-template #rowRef let-collectionId="collectionId" let-width="width" let-height="height">
      <div (click)="picker.toggleSelection(collectionId)">
        <app-collection-row-item 
          [collectionId]="collectionId" 
          [width]="width" 
          [height]="height"
          [isMenuOpen]="false"
        >
          <span #icon icon class="check-icon"> {{ picker.getSelectionIcon(collectionId) }} </span>
        </app-collection-row-item>
      </div>
    </ng-template>
  </app-collections-list>
</app-generic-picker>
