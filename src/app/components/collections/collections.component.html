<h1> Collections </h1>

<div class="search-box">
  <input 
    class="input-search"
    type="text"
    placeholder="Search on the collection..."
    [value]="searchQuery()"
    (input)="searchQuery.set($any($event.target).value)"
  />
</div>

<app-collections-virtualization [collectionIds]="collectionIds()"></app-collections-virtualization>
