@if (loading) {
  <p>Loading ...</p>
}
@else if (collection) {
  <section>

    <a [routerLink]="collectionLink(query)">
      <h2 class="title">
        {{collection.name}} 
        <img src="assets/icons/chevron.svg"/>
      </h2>
    </a>

    <cdk-virtual-scroll-viewport 
      orientation="horizontal" 
      itemSize="" 
      class="viewport"
      minBufferPx="800" 
      maxBufferPx="1600"
    >

      <div *cdkVirtualFor="let media of collection.mediaList; trackBy: trackByMediaId" class="media-item" >
        <a [routerLink]="['/media', media.id]">
          <img class="image"
          [src]="media.id | posterPath"
            [alt]="media.title"
            loading="lazy"
          />
        </a>
      </div>

    </cdk-virtual-scroll-viewport>

  </section>
}
