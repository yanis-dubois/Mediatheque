<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <g color="white" 
    fill="none" 
    stroke-width="2"
  >
    <rect x="4" y="5" width="16" height="14" rx="1.5" stroke="currentColor"/>

    <rect x="5" y="6" width="14" height="3" stroke="currentColor" fill="white"/>

    <path stroke="white" d="M 7 12.5 12 12.5" fill="none" stroke-width="1.5" stroke-linecap="round"/>

    <path stroke="white" d="M 7 15.5 17 15.5" fill="none" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <style>
    #grid-layer { display: none; }
    @media (min-width: 100px) {
      #grid-layer { display: block; opacity: 0.3; }
    }
  </style>

  <g id="grid-layer">
    <defs>
      <pattern id="grid" width="2" height="2" patternUnits="userSpaceOnUse">
        <path d="M 2 0 L 0 0 0 2" fill="none" stroke="gray" stroke-width="0.05"/>
      </pattern>
    </defs>
    <rect width="24" height="24" fill="url(#grid)" pointer-events="none" />
  </g>
</svg>
