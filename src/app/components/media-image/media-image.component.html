@let src = source();
@let hasImg = hasImage();

@if (hasImg) {
  @if (src) {
    <img 
      [src]="src" 
      [alt]="title()"
      [style]="customStyle()"
    >
  } @else {
    <div 
      class="skeleton-card"
      [style]="customStyle()"
    ></div>
  }
} @else {
  <app-default-image 
    [type]="type()" 
    [title]="title()"
    [style]="customStyle()"
  >
  </app-default-image>
}
