<div class="three-step-container">
  @if (fiveStepFromPercent(score()); as value) {
    <select 
      [value]="value"
      (change)="onChange($event)"
      class="three-step-select"
    >
      @for (option of options; track option) {
        <option [value]="option" [selected]="option === value">
          {{ (option | emojize) + " " + (option | humanize) }}
        </option>
      }
    </select>
  }
</div>
