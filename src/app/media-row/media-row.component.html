<a>
  <h2 class="title">
    {{collection.name}} 
    <img src="assets/icons/chevron.svg"/>
  </h2>
</a>

<div class="row">
  <div class="card" *ngFor="let media of collection.mediaList">
    <a [title]="media.name">
      <img class="image"
        [src]="media.imageUrl"
        [alt]="media.name"
      />
    </a>
  </div>
</div>
