@let src = source();
@let hasImg = hasImage();

@if (hasImg) {
  @if (src) {
    <img 
      #imgElement
      [src]="src" 
      [alt]="title()"
      [style]="customStyle()"
      (load)="onLoad.emit(imgElement)"
    >
  }
} @else {
  <app-default-image 
    [type]="type()" 
    [title]="title()"
    [style]="customStyle()"
  >
  </app-default-image>
}
