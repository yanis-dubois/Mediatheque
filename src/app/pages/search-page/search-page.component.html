@if (mode(); as mode) {
  @let isLibrary = mode === 'library';

  <app-action-bar [leftButtonType]="'home'">
    <div class="tool-bar menu-background">
      <div 
        class="tool-item" 
        [class.is-active]="isLibrary"
        (click)="onModeChange('library')"
      >
        Library
      </div>
      <div 
        class="tool-item" 
        [class.is-active]="!isLibrary"
        (click)="onModeChange('api')"
      >
        Internet
      </div>
    </div>
  </app-action-bar>

  <section class="page-container virtual">

    <div class="page-header">
      @let ctx = context();
      <h1>Search {{ctx.type === 'SPECIFIC' ? (ctx.value | humanize) : 'Anything'}}</h1>

      <div class="search-box">
        <input 
          #searchInput
          class="input-search"
          type="text"
          [placeholder]="'Search '+(isLibrary ? 'in' : 'on')+' the '+(isLibrary ? 'library' : 'internet')+'...'"
          [value]="searchQuery()"
          (input)="searchQuery.set($any($event.target).value)"
          (keydown.enter)="searchInput.blur()"
          (keydown.escape)="searchQuery.set(''); searchInput.blur()"
        />

        <div class="media-count">
          {{ isLibrary ? libraryResultsCount() : apiResultsCount() }}
        </div>
      </div>
    </div>

    @if (isLibrary) {
      <app-search-list 
        class="virtual-host virtual-host-list"
        [layoutData]="layoutData()" 
        (endReached)="onScrollLibrary()"
      >
      </app-search-list>
    } @else {
      <app-api-search-list
        class="virtual-host virtual-host-list"
        [layoutData]="apiResults()" 
        (endReached)="onScrollApi()"
      >
      </app-api-search-list>
    }

  </section>
}
