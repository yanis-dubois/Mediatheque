<app-generic-list 
  [items]="mediaLayoutData()"
  [itemHeight]="containerHeight()"
  (visibleItemsChanged)="onVisibleItemsChanged($event)" 
  (windowResize)="updateDimensions()" 
>
  <ng-template #rowRef let-item let-index="index">
    <ng-container 
      [ngTemplateOutlet]="rowTemplate" 
      [ngTemplateOutletContext]="{ 
        mediaId: item[0], 
        width: containerWidth(), 
        height: containerHeight(),
      }">
    </ng-container>
  </ng-template>
</app-generic-list>
