<div class="page-container picker-container">
  <header class="page-header picker-header">
    <h2>{{ title() }}</h2>

    <div class="picker-header-content">
      <button class="cancel-btn" (click)="onCancel.emit()">Cancel</button>
      <div class="search-box">
        <input 
          class="input-search"
          type="text"
          [ngModel]="searchQuery()" 
          (ngModelChange)="onSearchChange($event)"
          [placeholder]="searchPlaceholder()"
        />
      </div>
      <button 
        class="done-btn" 
        [disabled]="selectedIds().size === 0"
        (click)="onConfirm.emit(selectedIds())"
      >
        Confirm ({{ selectedIds().size }})
      </button>
    </div>
  </header>

  <ng-content></ng-content>
</div>
