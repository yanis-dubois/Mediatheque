<app-entity-row-layout [height]="height()" [isMenuOpen]="false">

  @let media = entity();

  <div card [style.height.px]="height()">
    @if (media) {
      <img 
        [src]="'https://image.tmdb.org/t/p/w92' + media.posterPath"
        [alt]="media.title" 
        [style.width.px]="width()" 
        [style.height.px]="height()"
      >
    } @else {
      <div class="skeleton-card" 
        [style.width.px]="width()" 
        [style.height.px]="height()">
      </div>
    }
  </div>

  <div text>
    @if (media) {
      <p class="title">{{ media.title }}</p>
      <p class="sub-info">
        {{ media.releaseDate | date:'mediumDate' }}
      </p>
    } @else {
      <div class="skeleton-text title"></div>
      <div class="skeleton-text info"></div>
      <div class="skeleton-text sub-info"></div>
    }
  </div>

  <div menu>
    @if (media) {
      <ng-content select="[menu]"></ng-content>
    }
  </div>

</app-entity-row-layout>
