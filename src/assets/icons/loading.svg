<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g color="white">
    <defs>
      <linearGradient id="RadialGradient">
        <stop offset="0%" stop-color="currentColor" stop-opacity="1"/>
        <stop offset="25%" stop-color="currentColor" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #circle {
        transform-origin: 50% 50%;
        stroke: url(#RadialGradient);
        fill: none;
        animation: spin 0.7s infinite linear;
      }
    </style>

    <circle cx="12" cy="12" r="7" id="circle" stroke-width="2.5"/>
  </g>

  <style>
    #grid-layer { display: none; }
    @media (min-width: 100px) {
      #grid-layer { display: block; opacity: 0.3; }
    }
  </style>

  <g id="grid-layer">
    <defs>
      <pattern id="grid" width="2" height="2" patternUnits="userSpaceOnUse">
        <path d="M 2 0 L 0 0 0 2" fill="none" stroke="gray" stroke-width="0.05"/>
      </pattern>
    </defs>
    <rect width="24" height="24" fill="url(#grid)" pointer-events="none" />
  </g>
</svg>
