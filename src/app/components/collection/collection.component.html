@if (error) {
    <p>Error : {{ error }}</p>
} 
@else if (collection) {
  <section>
    @switch (view) {
      @case (CollectionDisplayMode.PREVIEW) {
        <app-collection-line
          [collection]="collection"
          [loading]="loading"
        />
      }
      @case (CollectionDisplayMode.DETAILS) {
        <app-collection-details
          [collection]="collection"
          [loading]="loading"
        />
      }
    }
  </section>
}
