<nav class="nav">
  <div class="nav-navigate menu-background" [class.active]="isTypeActive(PageType.HOME)" >
    <a 
      (click)="onPageChange('home')"
      [class.active]="isTypeActive(PageType.HOME)" 
      class="nav-item"
    >
      🏠
    </a>
  </div>

  <div class="nav-group menu-background">
    <a 
      (click)="onContextChange()"
      [class.active]="isTypeActive()" 
      class="nav-item"
    >
      🪎
    </a>
    <hr class="divider">
    @for (type of mediaType; track type) {
      <a 
        (click)="onContextChange(type)"
        [class.active]="isTypeActive(type)" 
        class="nav-item"
      >
        {{ type | emojize }}
      </a>
    }
  </div>

  <div class="nav-navigate menu-background" [class.active]="isTypeActive(PageType.SEARCH)" >
    <a 
      (click)="onPageChange('search')"
      [class.active]="isTypeActive(PageType.SEARCH)" 
      class="nav-item"
    >
      🔍
    </a>
  </div>
</nav>
