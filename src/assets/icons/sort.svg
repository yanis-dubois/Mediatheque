<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g color="white" 
    stroke="currentColor"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M7 18V7"/>
    <path d="M4 9L7 6L10 9"/>

    <path d="M17 6v10"/>
    <path d="M14 15l3 3 3-3"/>
