<div *ngIf="loading">Loading ...</div>

<section *ngIf="collection">

  <h1> {{collection.name}} </h1>

  <div class="grid">
    <div class="card" *ngFor="let media of collection.mediaList">
      <a [routerLink]="['/media', media.id]" [title]="media.title">
        <img class="image"
          [src]="media.imageUrl"
          [alt]="media.title"
        />
      </a>
    </div>
  </div>

</section>
