<app-entity-row-layout [height]="height()" [isMenuOpen]="isMenuOpen()">

  @let company = entity();

  <div text>
    @if (company) {
      <p class="title">{{ company.name }}</p>
      @if (display() === 'search') {
        <p class="sub-info">{{ type | humanize }}</p>
      }
    } @else {
      <div class="skeleton-text title"></div>
      @if (display() === 'search') {
        <div class="skeleton-text sub-info"></div>
      }
    }
  </div>

</app-entity-row-layout>
