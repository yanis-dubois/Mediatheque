<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g color="white"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <!-- head -->
    <circle cx="12" cy="8" r="3"/>

    <!-- shoulders -->
    <path d="M5 19c1.5-4 12.5-4 14 0"/>
  </g>

  <style>
    #grid-layer { display: none; }
    @media (min-width: 100px) {
      #grid-layer { display: block; opacity: 0.3; }
    }
  </style>

  <g id="grid-layer">
    <defs>
      <pattern id="grid" width="2" height="2" patternUnits="userSpaceOnUse">
        <path d="M 2 0 L 0 0 0 2" fill="none" stroke="gray" stroke-width="0.05"/> 
      </pattern>
    </defs>
    <rect width="24" height="24" fill="url(#grid)" pointer-events="none" />
  </g>
</svg>
