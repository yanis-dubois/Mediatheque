<app-action-bar>
  <app-dropdown
    [customClass]="'action-button'"
    [isOpenExternal]="true"
  >
    <button class="dropdown-button" (click)="addCollection()">
      + Create collection
    </button>
    <button class="dropdown-button" (click)="addCollection(true)">
      + Create dynamic collection
    </button>
  </app-dropdown>
</app-action-bar>

<section class="page-container">
  <div class="page-header">
    <h1> Collections </h1>

    <div class="search-box">
      <input 
        #searchInput
        class="input-search"
        type="text"
        placeholder="Search a collection..."
        [value]="searchQuery()"
        (input)="searchQuery.set($any($event.target).value)"
        (keydown.enter)="searchInput.blur()"
        (keydown.escape)="searchQuery.set(''); searchInput.blur()"
      />
    </div>
  </div>

  <app-collections-virtualization 
    class="virtual-host"
    [collectionIds]="collectionIds()"
  >
  </app-collections-virtualization>
</section>
