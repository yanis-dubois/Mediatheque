<div *ngIf="loading">Loading ...</div>

<div *ngIf="error">Error : {{ error }}</div>

<section *ngIf="collection">
  <ng-container [ngSwitch]="view">
    <app-collection-grid
      *ngSwitchCase="'grid'"
      [collection]="collection"
      [loading]="loading"
    />
  
    <app-collection-row
      *ngSwitchCase="'row'"
      [collection]="collection"
      [query]="query"
      [loading]="loading"
    />
  </ng-container>
</section>
