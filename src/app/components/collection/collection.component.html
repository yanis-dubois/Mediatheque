@if (error) {
    <p>Error : {{ error }}</p>
} 
@else if (collection) {
  <section>
    <ng-container [ngSwitch]="view">

      <app-collection-line
        *ngSwitchCase="'line'"
        [collection]="collection"
        [id]="id"
        [loading]="loading"
      />

      <app-collection-grid
        *ngSwitchCase="'grid'"
        [collection]="collection"
        [loading]="loading"
      />

      <app-collection-column
        *ngSwitchCase="'column'"
        [collection]="collection"
        [loading]="loading"
      />

      <app-collection-row
        *ngSwitchCase="'row'"
        [collection]="collection"
        [loading]="loading"
      />
  
      <p *ngSwitchDefault>invalid collection view : {{ view }}</p>
    </ng-container>
  </section>
}
