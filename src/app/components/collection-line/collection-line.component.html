@if (loading) {
  <p>Loading ...</p>
}
@else if (collection) {
  <section>

    <a [routerLink]="['/collection', collection.id]">
      <h2 class="title">
        {{collection.name}} 
        <img src="assets/icons/chevron.svg"/>
      </h2>
    </a>

    <div #scrollElement class="viewport-container">
      <div
        style="height: 100%; position: relative;"
      >
        @for (vItem of virtualizer.getVirtualItems(); track vItem.key) {
          @if (getMediaLayout(vItem.index); as layout) {
            <div
              class="line"
              [style.width.px]="vItem.size"
              [style.transform]="'translateX(' + vItem.start + 'px)'"
              style="position: absolute; top: 0; left: 0; height: 100%;"
            >
              <div class="card"
                [style.--scale-width]="1 + (8 / getElementWidth(vItem.index))"
                [style.--scale-height]="1 + (8 / containerHeight())"
              >
                @if (visibleMediaMap()[layout.id]; as media) {
                  <a [routerLink]="['/media', media.id]">
                    <img 
                      [src]="media.id | posterPath"
                      [alt]="media.title"
                    />
                  </a>
                }
                @else {
                  <div class="skeleton-card" 
                    [style.width.px]="getElementWidth(vItem.index)" 
                    [style.height.px]="containerHeight()"
                  ></div>
                }
              </div>
            </div>
          }
        }
      </div>
    </div>

  </section>
}
