<app-action-bar>
  <app-dropdown
    [customClass]="'action-button action-button-right menu-background'"
    [isOpenExternal]="true"
  >
    <app-collections-action/>
  </app-dropdown>
</app-action-bar>

<section class="page-container">
  <div class="page-header">
    <h1>
      @if (context(); as context) {
        @if (context.type === 'SPECIFIC') {
          {{ context.value | humanize }}
        }
      }
      Collections
    </h1>

    <div class="search-box">
      <input 
        #searchInput
        class="input-search"
        type="text"
        placeholder="Search a collection..."
        [value]="searchQuery()"
        (input)="searchQuery.set($any($event.target).value)"
        (keydown.enter)="searchInput.blur()"
        (keydown.escape)="searchQuery.set(''); searchInput.blur()"
      />
    </div>
  </div>

  <app-collections-virtualization 
    class="virtual-host-collections"
    [collectionIds]="collectionIds()"
  >
  </app-collections-virtualization>
</section>
