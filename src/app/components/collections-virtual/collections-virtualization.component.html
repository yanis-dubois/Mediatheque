<section
  [style.height]="'100%'"
  [style.width]="'100%'"
>
  <div #scrollElement 
    class="viewport-container viewport-container-collections"
    [style.height]="'100%'"
  >
    <div
      [style.height.px]="virtualizer.getTotalSize()"
      style="position: relative;"
    >
      @for (vItem of virtualizer.getVirtualItems(); track vItem.index) {
        @if (collectionIds()[vItem.index]; as id) {
          <div
            [style.height.px]="containerHeight()" 
            [style.width.%]="100" 
            [style.transform]="'translateY(' + vItem.start + 'px)'"
            style="position: absolute; top: 0; left: 0;"
          >
            <app-collection [id]="id" [view]="CollectionDisplayMode.PREVIEW">
              <div collectionMenu (click)="$event.preventDefault(); $event.stopPropagation()" class="collection-action">
                <app-dropdown
                  [customClass]="'line-action'"
                  [isOpenExternal]="activeMenuId() === id"
                  (opened)="activeMenuId.set(id)"
                  (closed)="activeMenuId.set(null)"
                >
                  <app-collection-action 
                    [collectionId]="id"
                    (closeMenu)="activeMenuId.set(null);"
                  />
                </app-dropdown>
              </div>
            </app-collection>
          </div>
        } @else {
          <div
            class="skeleton-container"
            [style.height.px]="containerHeight()" 
            [style.width.%]="100" 
            [style.transform]="'translateY(' + vItem.start + 'px)'"
            style="position: absolute; top: 0; left: 0; display: flex; flex-direction: column;"
          >
            <div class="skeleton-text"></div>
            <div class="skeleton-card"></div>
          </div>
        }
      }
    </div>
  </div>
</section>
