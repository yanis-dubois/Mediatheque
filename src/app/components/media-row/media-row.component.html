<div class="row-content" [style.height.px]="height">
  <div class="card"
    [style.--scale-width]="1 + (8 / width)"
    [style.--scale-height]="1 + (8 / height)"
  >
    <img 
      [src]="media.id | posterPath"
      [alt]="media.title"
      [style.width.px]="width"
      [style.height.px]="height"
    >
  </div>

  <div class="infos-container"
    [style.height.px]="height" 
  >
    <div class="infos">
      <div class="text-group">
        <h3 class="title">{{ media.title }}</h3>
        <p class="type">{{ media.mediaType | emojize }} - {{ media.status | humanize }}</p>
        <p class="date">{{ media.releaseDate | date:'dd MMM yyyy' }}</p>
      </div>
  
      <div class="icon-group">
        <ng-content class="icon" select="[action]"></ng-content>
      </div>
    </div>

    <hr class="separator"/>
  </div>
</div>
